<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reframe Extension Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #15102a 50%, #06020f 100%);
      --accent-primary: #818cf8;
      --accent-secondary: #c084fc;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(0, 0, 0, 0.3);
      --input-focus-border: rgba(129, 140, 248, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* Ambient background glows */
    .glow-1 {
      position: absolute;
      top: 20%;
      left: 15%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
      z-index: 0;
    }

    .glow-2 {
      position: absolute;
      bottom: 20%;
      right: 15%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 24px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      text-align: center;
    }

    .logo-container {
      width: 64px;
      height: 64px;
      background: var(--accent-gradient);
      border-radius: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 20px rgba(129, 140, 248, 0.3);
      margin-bottom: 20px;
    }

    .logo-svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: white;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff 30%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text-main);
      outline: none;
      transition: all 0.25s ease;
    }

    .input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
    }

    .input::placeholder {
      color: #4b5563;
    }

    .btn {
      width: 100%;
      background: var(--accent-gradient);
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px rgba(129, 140, 248, 0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(129, 140, 248, 0.35);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    .status.success {
      display: block;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34d399;
    }

    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .note {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      text-align: center;
    }

    .note a {
      color: var(--accent-primary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .note a:hover {
      color: var(--accent-secondary);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="container">
    <div class="card">
      <div class="header">
        <div class="logo-container">
          <svg class="logo-svg" viewBox="0 0 24 24">
            <!-- Intersecting path or custom drawing representing "C" + visual edit -->
            <path d="M12 4a8 8 0 1 0 8 8" />
            <path d="M16 4h4v4" />
            <path d="M20 4L14 10" />
          </svg>
        </div>
        <h1 class="title">Reframe Settings</h1>
        <p class="subtitle">Enter your Gemini or Groq API Key to enable AI layout customization.</p>
      </div>

      <div class="form-group">
        <label for="api-key" class="label">API Key (Gemini, Groq, OpenRouter, or 'ollama')</label>
        <div class="input-wrapper">
          <input type="password" id="api-key" class="input" placeholder="AIzaSy... or gsk_... or sk-or-... or ollama">
        </div>
      </div>

      <div class="form-group" style="margin-top: 16px;">
        <label for="model-name" class="label">Model Name (Optional Override)</label>
        <div class="input-wrapper">
          <input type="text" id="model-name" class="input" placeholder="e.g. llama3.2 (Required for Ollama)">
        </div>
      </div>

      <button id="save-btn" class="btn">Save API Key</button>

      <div id="status" class="status"></div>

      <p class="note">
        Need an API key? Get one from 
        <a href="https://aistudio.google.com/" target="_blank">Google</a>, 
        <a href="https://console.groq.com/" target="_blank">Groq</a>, or 
        <a href="https://openrouter.ai/" target="_blank">OpenRouter</a>.<br>
        For local inference, type <strong>ollama</strong> as the key and specify your pulled model.
      </p>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
